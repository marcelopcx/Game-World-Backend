services:
  db:
    image: postgres:16-alpine
    container_name: game_world_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gameworld
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: game_world
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameworld -d game_world"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
